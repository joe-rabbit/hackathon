services:
  influxdb:
    image: influxdb:2.7
    container_name: hackathon-influxdb
    restart: unless-stopped
    ports:
      - "8086:8086"
    environment:
      DOCKER_INFLUXDB_INIT_MODE: setup
      DOCKER_INFLUXDB_INIT_USERNAME: admin
      DOCKER_INFLUXDB_INIT_PASSWORD: admin12345
      DOCKER_INFLUXDB_INIT_ORG: hackathon
      DOCKER_INFLUXDB_INIT_BUCKET: metrics
      DOCKER_INFLUXDB_INIT_ADMIN_TOKEN: hackathon-dev-token
    volumes:
      - influxdb2-data:/var/lib/influxdb2
      - influxdb2-config:/etc/influxdb2
    healthcheck:
      test: ["CMD", "influx", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - hackathon-network

  ollama:
    image: ollama/ollama:latest
    container_name: hackathon-ollama
    restart: unless-stopped
    volumes:
      - ollama-data:/root/.ollama
    networks:
      - hackathon-network

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: hackathon-app
    restart: unless-stopped
    volumes:
      - ./dashboard:/hackathon/dashboard
      - ./pI:/hackathon/pI
      - ./tamagochi:/hackathon/tamagochi
      - ./requirements.txt:/hackathon/requirements.txt
    environment:
      - DASHBOARD_URL=http://influxdb:8086
      - OLLAMA_HOST=http://ollama:11434
    depends_on:
      - influxdb
      - ollama
    networks:
      - hackathon-network
    stdin_open: true
    tty: true
    command: bash

volumes:
  influxdb2-data:
  influxdb2-config:
  ollama-data:

networks:
  hackathon-network:
    driver: bridge
